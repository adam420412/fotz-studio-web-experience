name: SEO checks

on:
  workflow_dispatch:
  # Wyłączono automatyczne testy na push - uruchamiaj ręcznie przez Actions → Run workflow
  # push:
  #   branches: ["main"]

jobs:
  seo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate sitemap exists
        timeout-minutes: 1
        run: |
          if [ -f "public/sitemap.xml" ]; then
            echo "✅ sitemap.xml exists"
            head -20 public/sitemap.xml
          else
            echo "❌ sitemap.xml not found"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build project
        run: npm run build

      - name: Validate sitemap-main.xml (indexable + no duplicates)
        run: node scripts/validate-sitemap-indexable.mjs

  # Live check - tylko ręcznie (workflow_dispatch)
  seo_live:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run redirect smoke test (live)
        run: node scripts/seo-smoke-test.mjs

      - name: Run live canonical check (all 135+ URLs)
        run: node scripts/seo-canonical-check.mjs --live
