name: TypeScript Typecheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck (whole project)
        run: npx tsc --noEmit

      - name: Targeted SEO page typecheck
        # Re-runs the project typecheck but fails loudly when any error
        # touches an SEO city/service page so regressions are easy to spot.
        run: |
          set -o pipefail
          npx tsc --noEmit --pretty false 2>&1 | tee tsc.log
          if grep -E "src/pages/(AgencjaMarketingowa|SEO)[^:]*\.tsx" tsc.log; then
            echo "::error::SEO page TypeScript regression detected"
            exit 1
          fi